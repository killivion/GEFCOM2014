# Fast development config: same as default.yaml, but with a reduced
# 20-quantile grid instead of the full 99 (1st-99th percentile). Use this
# while iterating on code, since LightGBM trains one model per quantile
# level per fold -- 20 quantiles run roughly 5x faster than 99. Switch
# back to configs/default.yaml (or pass no --config at all) before
# reporting final results, since the assignment asks for the full grid.

data:
  raw_load_dir: "src/data/raw/Load"
  processed_path: "src/data/processed/full_load.csv"
  n_tasks: 15

quantiles:
  # 20 evenly-spaced quantiles (step 0.05) plus the two extreme tails,
  # still including 0.05/0.25/0.5/0.75/0.95 so the "selected quantile"
  # detail tables in run_*.py still populate, and including 0.5 since
  # the LightGBM "full" feature set requires it (see lightgbm_model.py).
  levels: [0.01, 0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.35, 0.40, 0.45,
           0.50, 0.55, 0.60, 0.65, 0.70, 0.75, 0.80, 0.85, 0.95, 0.99]

leakage:
  use_actual_future_temperature: true

model:
  name: "lightgbm_quantile"
  params:
    n_estimators: 300
    max_depth: 4
    learning_rate: 0.05
    num_leaves: 63

backtest:
  first_test_task: 2
  last_test_task: 15
